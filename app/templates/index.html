<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Araç Fiyat Tahmini</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050508;color:#e2e8f0;font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.card{background:#13131f;border:1px solid #1e1e35;border-radius:16px;padding:2rem;max-width:540px;width:100%;box-shadow:0 0 40px #00d4ff11}
h1{font-size:1.5rem;font-weight:800;margin-bottom:.5rem;background:linear-gradient(135deg,#00d4ff,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p.sub{color:#64748b;font-size:.875rem;margin-bottom:1.5rem}
label{display:block;font-size:.75rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem}
input,select{width:100%;background:#0e0e16;border:1px solid #1e1e35;border-radius:8px;padding:.6rem .8rem;color:#e2e8f0;font-size:.875rem;margin-bottom:1rem;outline:none}
input:focus,select:focus{border-color:#00d4ff44}
button{width:100%;padding:.85rem;background:#00d4ff;color:#050508;font-weight:700;font-size:.9rem;border:none;border-radius:8px;cursor:pointer;margin-top:.5rem}
button:hover{background:#00b8d9}
#result{display:none;margin-top:1.5rem;background:#0e0e16;border:1px solid #00d4ff22;border-radius:10px;padding:1.25rem;text-align:center}
.pred{font-size:2rem;font-weight:800;color:#00d4ff;margin:.5rem 0}
.conf{font-size:.8rem;color:#64748b}
.badge{display:inline-block;background:#00d4ff15;border:1px solid #00d4ff33;color:#00d4ff;border-radius:999px;padding:.25rem .75rem;font-size:.75rem;margin-bottom:1rem}
</style>
</head>
<body>
<div class="card">
  <div class="badge">ML Model — Gradient Boosting</div>
  <h1>Araç Fiyat Tahmini 🚗</h1>
  <p class="sub">Araç özelliklerinizi girin, tahmini piyasa fiyatını öğrenin.</p>

  <label>Marka</label>
  <select id="brand">
    {% for b in brands %}<option value="{{ b }}">{{ b }}</option>{% endfor %}
  </select>

  <label>Yakıt Tipi</label>
  <select id="fuel">
    {% for f in fuels %}<option value="{{ f }}">{{ f }}</option>{% endfor %}
  </select>

  <label>Vites</label>
  <select id="transmission">
    {% for t in transmissions %}<option value="{{ t }}">{{ t }}</option>{% endfor %}
  </select>

  <label>Model Yılı</label>
  <select id="year">
    {% for y in range(2023, 2004, -1) %}<option value="{{ y }}">{{ y }}</option>{% endfor %}
  </select>

  <label>Kilometre</label>
  <input type="number" id="km" placeholder="Örnek: 85000" value="85000" min="0" max="500000">

  <button onclick="predict()">Fiyat Tahmin Et</button>

  <div id="result">
    <div style="color:#94a3b8;font-size:.8rem;margin-bottom:.25rem">Tahmini Piyasa Fiyatı</div>
    <div class="pred" id="predValue">—</div>
    <div class="conf" id="confValue"></div>
  </div>
</div>

<script>
async function predict() {
  const btn = document.querySelector('button');
  btn.textContent = 'Hesaplanıyor...';
  btn.disabled = true;
  try {
    const res = await fetch('/predict', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        brand: document.getElementById('brand').value,
        fuel: document.getElementById('fuel').value,
        transmission: document.getElementById('transmission').value,
        year: parseInt(document.getElementById('year').value),
        km: parseInt(document.getElementById('km').value) || 0
      })
    });
    const data = await res.json();
    document.getElementById('predValue').textContent = data.prediction;
    document.getElementById('confValue').textContent = `Model Güveni: %${(data.confidence * 100).toFixed(0)}`;
    document.getElementById('result').style.display = 'block';
  } catch(e) {
    alert('Tahmin hatası: ' + e.message);
  }
  btn.textContent = 'Fiyat Tahmin Et';
  btn.disabled = false;
}
</script>
</body>
</html>
